openapi: 3.1.0
info:
  title: wa-hub-demo — WhatsApp HTTP API
  version: 0.2.0
  description: >
    Self-hosted WhatsApp HTTP API (Baileys). REST + JSON, with HMAC-signed outbound webhooks.
    PRECONDITION: a WhatsApp device must be paired once (scan a QR at GET /pair) before any send
    works — otherwise send routes return 503 not_connected. Confirm readiness with
    GET /api/instance/status (connection must be "connected"). See docs/INTEGRATION.md.
  license:
    name: MIT
servers:
  - url: https://wa.yourdomain.com
    description: Your stable subdomain (recommended) — or the ephemeral https://<random>.trycloudflare.com tunnel URL
  - url: http://127.0.0.1:3060
    description: On the server itself (loopback)

security:
  - bearerAuth: []

tags:
  - name: instance
  - name: messages
  - name: groups
  - name: check
  - name: open

paths:
  /healthz:
    get:
      tags: [open]
      summary: Liveness probe (no auth)
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  connection: { $ref: '#/components/schemas/Connection' }
  /pair:
    get:
      tags: [open]
      summary: Live pairing page; becomes a console after linking (HTML, no secret)
      security: []
      responses:
        '200': { description: HTML page, content: { text/html: {} } }
  /:
    get:
      tags: [open]
      summary: Redirects (302) to /pair
      security: []
      responses:
        '302': { description: Redirect to /pair }

  /api/instance/status:
    get:
      tags: [instance]
      summary: Connection state, paired account, and webhook config
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Status' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/instance/qr:
    get:
      tags: [instance]
      summary: Current pairing QR as a data URL
      responses:
        '200':
          description: A fresh QR
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataUrl: { type: string, description: "data:image/png;base64,..." }
                  expiresAt: { type: integer, description: epoch ms }
        '404': { description: No QR staged yet (retry shortly), content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409': { description: Already paired, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/instance/qr.png:
    get:
      tags: [instance]
      summary: Current pairing QR rendered as a PNG
      responses:
        '200': { description: PNG image, content: { image/png: {} } }
        '404': { description: No QR staged (empty body) }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/instance/smoketest:
    post:
      tags: [instance]
      summary: Send a confirmation message to the paired number (end-to-end self-test)
      description: Requires connection=="connected" (it messages the paired account itself). No request body.
      responses:
        '200':
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  sentTo: { type: string }
                  id: { type: string }
                  timestamp: { type: integer }
        '503': { $ref: '#/components/responses/NotConnected' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/instance/diagnose:
    get:
      tags: [instance]
      summary: Self-test battery (socket / internet / env / webhook)
      responses:
        '200': { description: Structured diagnosis, content: { application/json: { schema: { type: object } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/instance/health/wa:
    get:
      tags: [instance]
      summary: WhatsApp's own anti-abuse signals (reachout timelock + new-chat cap)
      description: >
        Network round-trip to WhatsApp. Watch these to back off BEFORE a ban — a rising/active
        reachoutTimelock means "stop messaging strangers". Requires connection=="connected".
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection: { $ref: '#/components/schemas/Connection' }
                  reachoutTimelock: { type: object, description: "WhatsApp reachout timelock, or { error } when the round-trip fails" }
                  newChatMessageCap: { type: object, description: "New-chat message cap, or { error } when the round-trip fails" }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/instance/webhook:
    get:
      tags: [instance]
      summary: Read the current webhook config
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Webhook' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [instance]
      summary: Set the webhook (requires X-Admin-Token when ADMIN_TOKEN is configured)
      security:
        - bearerAuth: []
          adminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Webhook' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Webhook' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/instance/webhook/failures:
    get:
      tags: [instance]
      summary: Last <=100 webhook delivery failures
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/instance/errors:
    get:
      tags: [instance]
      summary: Last <=50 route/unhandled errors
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/instance/logout:
    post:
      tags: [instance]
      summary: Unlink the device and start a fresh QR (requires X-Admin-Token when ADMIN_TOKEN is set)
      security:
        - bearerAuth: []
          adminToken: []
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/messages/send/text:
    post:
      tags: [messages]
      summary: Send a text message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, text]
              properties:
                to: { $ref: '#/components/schemas/Recipient' }
                text: { type: string, minLength: 1, maxLength: 4096 }
                quotedMessageId: { type: string }
      responses:
        '200': { $ref: '#/components/responses/SendResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/messages/send/image:
    post:
      tags: [messages]
      summary: Send an image (by URL or base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { $ref: '#/components/schemas/Recipient' }
                imageUrl: { type: string, format: uri }
                imageBase64: { type: string, description: "base64 or data: URL, max 20 MB decoded" }
                caption: { type: string, maxLength: 1024 }
      responses:
        '200': { $ref: '#/components/responses/SendResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/messages/send/file:
    post:
      tags: [messages]
      summary: Send a document/file (by URL or base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, filename]
              properties:
                to: { $ref: '#/components/schemas/Recipient' }
                fileUrl: { type: string, format: uri }
                fileBase64: { type: string }
                filename: { type: string, minLength: 1, maxLength: 255 }
                mimetype: { type: string, default: application/octet-stream }
                caption: { type: string, maxLength: 1024 }
      responses:
        '200': { $ref: '#/components/responses/SendResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/messages/send/audio:
    post:
      tags: [messages]
      summary: Send audio / a voice note (by URL or base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { $ref: '#/components/schemas/Recipient' }
                audioUrl: { type: string, format: uri }
                audioBase64: { type: string }
                ptt: { type: boolean, default: true, description: voice note }
      responses:
        '200': { $ref: '#/components/responses/SendResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/TooLarge' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/messages/send/location:
    post:
      tags: [messages]
      summary: Send a location pin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, latitude, longitude]
              properties:
                to: { $ref: '#/components/schemas/Recipient' }
                latitude: { type: number, minimum: -90, maximum: 90 }
                longitude: { type: number, minimum: -180, maximum: 180 }
                name: { type: string, maxLength: 255 }
                address: { type: string, maxLength: 500 }
      responses:
        '200': { $ref: '#/components/responses/SendResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/messages/send/reaction:
    post:
      tags: [messages]
      summary: React to a message (empty emoji removes the reaction)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, messageId, emoji]
              properties:
                to: { $ref: '#/components/schemas/Recipient' }
                messageId: { type: string, maxLength: 255 }
                emoji: { type: string, maxLength: 8 }
                fromMe: { type: boolean, default: false }
      responses:
        '200': { $ref: '#/components/responses/SendResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/messages/markRead:
    post:
      tags: [messages]
      summary: Mark a message as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, messageId]
              properties:
                to: { $ref: '#/components/schemas/Recipient' }
                messageId: { type: string, maxLength: 255 }
                fromMe: { type: boolean, default: false }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/messages/presence:
    post:
      tags: [messages]
      summary: Send a presence/chatstate (typing, recording, online, offline) — no message is sent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, type]
              properties:
                to: { $ref: '#/components/schemas/Recipient' }
                type: { type: string, enum: [composing, recording, paused, available, unavailable] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }

  /api/groups:
    get:
      tags: [groups]
      summary: List groups the paired account participates in
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        jid: { type: string }
                        name: { type: string }
                        participants: { type: integer }
                        owner: { type: string, nullable: true }
                        creation: { type: integer, nullable: true }
                        announce: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
    post:
      tags: [groups]
      summary: Create a group
      description: >
        ⚠ Bulk-creating groups or adding strangers is a top ban signal — use only with consenting participants.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject]
              properties:
                subject: { type: string, minLength: 1, maxLength: 100 }
                participants: { type: array, maxItems: 50, default: [], items: { type: string } }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  jid: { type: string }
                  subject: { type: string }
                  participants: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}:
    get:
      tags: [groups]
      summary: Full group metadata
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      responses:
        '200': { description: Group metadata, content: { application/json: { schema: { type: object } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/participants:
    post:
      tags: [groups]
      summary: Add / remove / promote / demote participants
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                add: { type: array, maxItems: 50, items: { type: string } }
                remove: { type: array, maxItems: 50, items: { type: string } }
                promote: { type: array, maxItems: 50, items: { type: string } }
                demote: { type: array, maxItems: 50, items: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/leave:
    post:
      tags: [groups]
      summary: Leave a group
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/subject:
    put:
      tags: [groups]
      summary: Rename a group (set its subject)
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject]
              properties:
                subject: { type: string, minLength: 1, maxLength: 100 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/description:
    put:
      tags: [groups]
      summary: Set the group description (empty/omitted clears it)
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description: { type: string, maxLength: 2048 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/settings:
    put:
      tags: [groups]
      summary: Lock/announce settings (who can post / edit group info)
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setting]
              properties:
                setting: { type: string, enum: [announcement, not_announcement, locked, unlocked] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/ephemeral:
    put:
      tags: [groups]
      summary: Toggle disappearing messages
      description: "seconds: 0 off, 86400 (24h), 604800 (7d), 7776000 (90d)."
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seconds]
              properties:
                seconds: { type: integer, minimum: 0 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/member-add-mode:
    put:
      tags: [groups]
      summary: Who may add members (admins only vs all members)
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [admin_add, all_member_add] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/join-approval:
    put:
      tags: [groups]
      summary: Require admin approval for joins via the invite link
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [on, off] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/invite:
    get:
      tags: [groups]
      summary: Get the group invite link/code (admin only)
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  code: { type: string, nullable: true }
                  url: { type: string, nullable: true }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/invite/revoke:
    post:
      tags: [groups]
      summary: Revoke the current invite link and return the new one (admin only)
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  code: { type: string, nullable: true }
                  url: { type: string, nullable: true }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/{jid}/requests:
    get:
      tags: [groups]
      summary: List pending join requests (admin only)
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  requests: { type: array, items: { type: object } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
    post:
      tags: [groups]
      summary: Approve or reject pending join requests (admin only)
      parameters:
        - { name: jid, in: path, required: true, schema: { type: string }, description: "15+ digit group id or <id>@g.us" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [participants, action]
              properties:
                participants: { type: array, minItems: 1, maxItems: 50, items: { type: string } }
                action: { type: string, enum: [approve, reject] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean }, results: { type: array, items: { type: object } } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/invite/{code}:
    get:
      tags: [groups]
      summary: Preview a group from an invite code (no join)
      parameters:
        - { name: code, in: path, required: true, schema: { type: string }, description: "The part after chat.whatsapp.com/ (or the full link)" }
      responses:
        '200': { description: Group metadata, content: { application/json: { schema: { type: object } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }
  /api/groups/join:
    post:
      tags: [groups]
      summary: Join a group via invite code/link
      description: "⚠ Mass-joining is a spam signal — use sparingly."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, description: "Invite code or full chat.whatsapp.com/ link" }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean }, jid: { type: string } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }

  /api/check/number:
    post:
      tags: [check]
      summary: Check which numbers are registered on WhatsApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [numbers]
              properties:
                numbers: { type: array, minItems: 1, maxItems: 50, items: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        input: { type: string }
                        exists: { type: boolean }
                        jid: { type: string, nullable: true }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/NotConnected' }

webhooks:
  event:
    post:
      summary: Outbound event delivered to your configured webhook URL
      description: >
        Signed with HMAC-SHA256 of the raw body using WEBHOOK_SECRET. Verify the x-hub-signature header
        over the RAW body before trusting the payload. Reply 2xx promptly.
      parameters:
        - { name: x-hub-signature, in: header, schema: { type: string }, description: "sha256=<hex>" }
        - { name: x-hub-event, in: header, schema: { type: string } }
        - { name: x-hub-timestamp, in: header, schema: { type: string }, description: epoch ms }
        - { name: x-hub-delivery, in: header, schema: { type: string }, description: unique per delivery }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  enum: [message.incoming, message.outgoing, message.status, instance.connected, instance.disconnected, instance.qr]
                timestamp: { type: integer }
                instance: { type: string }
                data: { type: object }
      responses:
        '200': { description: Acknowledged }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: The HUB_TOKEN.
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: Required on PUT /webhook and POST /logout only when ADMIN_TOKEN is configured.
  schemas:
    Connection:
      type: string
      enum: [disconnected, connecting, qr, connected]
    Recipient:
      type: string
      description: >
        +972501234567, 972501234567 (bare digits, normalized to @s.whatsapp.net),
        972501234567@s.whatsapp.net, a group <15+ digits>@g.us, or <id>@lid. No leading 0.
      example: "972501234567"
    Status:
      type: object
      properties:
        name: { type: string }
        connection: { $ref: '#/components/schemas/Connection' }
        me:
          type: object
          nullable: true
          properties:
            jid: { type: string }
            number: { type: string }
            name: { type: string, nullable: true }
        startedAt: { type: integer }
        uptimeMs: { type: integer }
        lastEventAt: { type: integer, nullable: true }
        webhook: { $ref: '#/components/schemas/Webhook' }
    Webhook:
      type: object
      properties:
        url: { type: string, nullable: true, format: uri }
        events:
          type: array
          items:
            type: string
            enum: [message.incoming, message.outgoing, message.status, instance.connected, instance.disconnected, instance.qr]
    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
  responses:
    SendResult:
      description: Sent
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean }
              id: { type: string }
              to: { type: string }
              timestamp: { type: integer }
    Unauthorized:
      description: Missing or invalid HUB_TOKEN
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Requires the X-Admin-Token header
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    BadRequest:
      description: >
        Invalid body / recipient / JSON — e.g. {"error":"invalid_body"} (with Zod issues) or
        {"error":"invalid_json"}. Oversized base64 media (…Base64 over the 20 MB decoded cap)
        also lands here as {"error":"invalid_body"} — "file_too_large" appears only inside
        issues[].message, NOT as the top-level error.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    TooLarge:
      description: >
        Media-by-URL (imageUrl/fileUrl/audioUrl) exceeds the 20 MB cap → {"error":"file_too_large"};
        or the whole request body exceeds 20 MB → {"error":"payload_too_large"}. (Oversized base64
        media is a 400 {"error":"invalid_body"} instead — see BadRequest.)
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotConnected:
      description: WhatsApp is not paired/connected yet
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
